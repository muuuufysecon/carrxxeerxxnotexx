    const { useState, useRef, useEffect } = React;

    // --- IndexedDB Local Storage ---
    const DB_NAME = 'CarrierNoteLocalDB';
    const STORE_NAME = 'notes';

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          if (!e.target.result.objectStoreNames.contains(STORE_NAME)) {
            e.target.result.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const saveToDB = async (key, data) => {
      try {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          store.put(data, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (error) {
        console.warn('IndexedDB save failed:', error);
        throw error;
      }
    };

    const loadFromDB = async (key) => {
      try {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      } catch (error) {
        console.warn('IndexedDB load failed:', error);
        throw error;
      }
    };

    // --- Local Storage (Fallback) ---
    const saveToLocalStorage = (key, data) => {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.warn('LocalStorage quota exceeded or not available');
      }
    };

    const loadFromLocalStorage = (key) => {
      try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : null;
      } catch (e) {
        return null;
      }
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed"; 
      textArea.style.left = "-9999px";
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        return true;
      } catch (err) {
        console.error('コピー失敗', err);
        return false;
      } finally {
        document.body.removeChild(textArea);
      }
    };

    const AutoFitText = ({ text, minSize = 12, maxSize = 36, className = "" }) => {
      const containerRef = useRef(null);
      const textRef = useRef(null);
      const [fontSize, setFontSize] = useState(maxSize);
      const [isCalculated, setIsCalculated] = useState(false);

      useEffect(() => {
        if (!containerRef.current || !textRef.current) return;
        if (!text) {
          setIsCalculated(true);
          return;
        }
        
        let low = minSize;
        let high = maxSize;
        let best = minSize;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          textRef.current.style.fontSize = `${mid}px`;
          
          if (textRef.current.scrollHeight <= containerRef.current.clientHeight && 
              textRef.current.scrollWidth <= containerRef.current.clientWidth) {
            best = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        textRef.current.style.fontSize = `${best}px`;
        setFontSize(best);
        setIsCalculated(true);
      }, [text, maxSize, minSize]);

      return (
        <div ref={containerRef} className={`w-full h-full overflow-hidden relative ${className}`} style={{ opacity: isCalculated ? 1 : 0 }}>
          <div ref={textRef} style={{ fontSize: `${fontSize}px`, width: '100%', height: 'max-content', whiteSpace: 'pre-wrap', wordBreak: 'break-word', lineHeight: '1.4', position: 'absolute', top: 0, left: 0 }}>
            {text}
          </div>
        </div>
      );
    };

    const compressImageTo100KB = (img) => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      let width = img.width, height = img.height, max_dim = 800;
      
      if (width > max_dim || height > max_dim) {
        if (width > height) { height *= max_dim / width; width = max_dim; }
        else { width *= max_dim / height; height = max_dim; }
      }
      
      let quality = 0.8; 
      canvas.width = width; canvas.height = height; 
      ctx.drawImage(img, 0, 0, width, height);
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      let sizeKB = Math.round(dataUrl.length * 3 / 4) / 1024;
      
      let attempts = 0;
      const MAX_ATTEMPTS = 15;

      while (sizeKB > 100 && attempts < MAX_ATTEMPTS) {
        if (quality > 0.3) {
          quality -= 0.1;
        } else {
          width *= 0.8; height *= 0.8; 
          canvas.width = width; canvas.height = height; 
          ctx.clearRect(0, 0, canvas.width, canvas.height); 
          ctx.drawImage(img, 0, 0, width, height);
          quality = 0.7; 
        }
        dataUrl = canvas.toDataURL('image/jpeg', quality); 
        sizeKB = Math.round(dataUrl.length * 3 / 4) / 1024;
        attempts++;
      }
      return dataUrl;
    };

                  <div key={item.id} className="relative flex items-center group/item">

                      <div className="flex">
                        <span className="mr-2 font-bold text-gray-400 select-none">・</span>

          <div className={`absolute top-0 left-4 sm:left-8 px-5 sm:px-8 ${bgColor} border-[3px] border-gray-800 rounded-full ${isExporting ? 'pt-0 pb-2' : 'py-1'} z-10 font-bold text-gray-900 shadow-sm flex items-center justify-start text-lg sm:text-xl tracking-widest`}>{num} {title}</div>
          <div className={`border-[3px] border-gray-800 rounded-3xl p-4 sm:p-6 pt-10 sm:pt-12 bg-white shadow-sm relative z-0 flex flex-col ${heightClass || 'h-48 sm:h-56'}`}>

                   <div onClick={() => openTextInput('現在の学年 (例: 1, 2, 3)', data.currentGrade, v => onUpdate('currentGrade', v))} className="w-16 text-center border-b-[3px] border-gray-400 pb-1 text-3xl font-black text-gray-800 cursor-pointer hover:bg-gray-50/50 min-h-[2.5rem]">{data.currentGrade || '　'}</div>

                   <div className="w-20 text-right border-b-[3px] border-gray-400 pb-1">{data.enterMonth}</div>

              <div className="flex items-center justify-center gap-2 sm:gap-4 w-full">

                   <div className="w-40 text-right border-b-[3px] border-gray-400 pb-1">{data.graduateYear}</div>

          {!isExporting && (
            <div className="mt-10 w-full max-w-4xl border-t-4 border-dashed border-gray-300 pt-8 px-4">
               <div className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                 <h3 className="text-gray-500 font-bold text-xl">もくじ</h3>
                 <div className="flex gap-2 bg-gray-100 p-1 rounded-full border border-gray-200">

                     <button key={g} onClick={() => setFilterGrade(g)} className={`px-4 py-1.5 rounded-full text-sm font-bold transition-colors ${filterGrade === g ? 'bg-white text-blue-600 shadow-sm border border-gray-200' : 'text-gray-500 hover:bg-gray-200'}`}>
                       {g === 'all' ? 'すべて表示' : `高${g}のみ`}

                   </div>
                   <div className="flex flex-wrap gap-3">
                     {visibleTargetTabs.length > 0 ? visibleTargetTabs.map(tab => (
                       <button key={tab.id} type="button" onClick={() => setActiveTab(tab.id)} className="px-6 py-2 bg-white text-blue-800 border-2 border-blue-200 rounded-full shadow-sm font-black text-lg active:scale-95 transition-transform">{tab.label}</button>
                     )) : <span className="text-sm text-gray-400 font-bold px-2">表示できるタブがありません</span>}
                   </div>
                 </div>
                 <div className="flex flex-col gap-3">
                   <div className="text-sm font-bold text-gray-400 border-b-2 border-gray-200 pb-1 flex justify-between items-center">

                     <button type="button" onClick={() => openNewTabModal('training')} className="text-blue-500 bg-blue-50 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-100">＋ 新しい記録を追加</button>
                   </div>
                   <div className="flex flex-wrap gap-3">
                     {visibleTrainingTabs.length > 0 ? visibleTrainingTabs.map(tab => (
                       <button key={tab.id} type="button" onClick={() => setActiveTab(tab.id)} className="px-6 py-2 bg-white text-blue-800 border-2 border-blue-200 rounded-full shadow-sm font-black text-lg active:scale-95 transition-transform">{tab.label}</button>
                     )) : <span className="text-sm text-gray-400 font-bold px-2">表示できるタブがありません</span>}
                   </div>
                 </div>
                 <div className="flex flex-col gap-3">
                   <div className="text-sm font-bold text-gray-400 border-b-2 border-gray-200 pb-1 flex justify-between items-center">

                     <button type="button" onClick={() => openNewTabModal('docs')} className="text-blue-500 bg-blue-50 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-100">＋ 新しい受賞歴を追加</button>
                   </div>
                   <div className="flex flex-wrap gap-3">
                     {visibleDocsTabs.length > 0 ? visibleDocsTabs.map(tab => (

                     )) : <span className="text-sm text-gray-400 font-bold px-2">表示できるタブがありません</span>}
                   </div>
                 </div>
                 <div className="flex flex-col gap-3">
                   <div className="text-sm font-bold text-gray-400 border-b-2 border-gray-200 pb-1">プロフィール</div>
                   <div className="flex flex-wrap gap-3">
                     {visibleProfileTabs.length > 0 ? visibleProfileTabs.map(tab => (
                       <button key={tab.id} type="button" onClick={() => setActiveTab(tab.id)} className="px-6 py-2 bg-white text-blue-800 border-2 border-blue-200 rounded-full shadow-sm font-black text-lg active:scale-95 transition-transform">{tab.label}</button>
                     )) : <span className="text-sm text-gray-400 font-bold px-2">表示できるタブがありません</span>}

                  <div className="border-b-[3px] border-gray-800 w-48 sm:w-64 pb-1 text-center tracking-widest text-gray-900 text-xl sm:text-2xl">{data.name}</div>

                  <div onClick={() => openTextInput('名前', data.name, v => onUpdate('name', v))} className="border-b-[3px] border-gray-800 w-48 sm:w-64 font-bold bg-transparent text-center tracking-widest text-gray-900 text-xl sm:text-2xl cursor-pointer hover:bg-gray-50/50 min-h-[2.5rem]">

            <TargetField 
              field="q2" num="②" title="先生からのアドバイス" bgColor="bg-red-200" 
              value={data.q2} onClick={() => openTextInput('先生からのアドバイス', data.q2, v => onUpdate('q2', v), true)} isExporting={isExporting} fontSizeMode={getFontSize('q2')} onFontSizeChange={onFontSizeChange}

              actionButton={

                  onGenerate={handleCopyActionPlanPrompt}

                     <span className="text-xs font-bold text-gray-500">タブ名</span>
                     <button type="button" onClick={() => setDeleteTabModal({ isOpen: true, targetId: activeTab })} className="text-xs text-red-500 hover:text-red-700 hover:bg-red-50 px-1 py-0.5 rounded transition-colors flex items-center gap-0.5" title="このタブを削除">
                       <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>タブを削除
                     </button>
                   </div>
                   <div onClick={() => openTextInput('タブ名', data.tabLabel, v => onUpdate('tabLabel', v))} className="text-sm font-bold border-2 border-gray-300 rounded px-2 py-1 w-32 bg-gray-50 text-gray-700 cursor-pointer hover:bg-gray-100 min-h-[2rem] flex items-center">
                     {data.tabLabel}
                   </div>
                 </div>
               )}
               <div className="flex-1 min-w-0 text-center md:text-left">
                 <div className={`text-xl sm:text-2xl md:text-3xl font-black text-gray-900 tracking-wide overflow-hidden text-ellipsis ${isExporting ? 'pt-0 pb-2' : ''}`}>{data.tabLabel}</div>
               </div>
             </div>
             {data.updatedAt && (
               <span className="text-xs sm:text-sm font-bold text-gray-500 shrink-0 ml-auto">
                 最終更新: {formatDate(data.updatedAt)}
               </span>
             )}
          </div>
          <div className="flex flex-col gap-4 mt-2 pb-8">
            <div className="flex flex-col gap-4 mb-2">
              <div className="w-full flex items-center border-b-[3px] border-gray-800 pb-1 relative group">
                <span className="font-bold text-gray-900 mr-2 whitespace-nowrap">実習先:</span>
                {isExporting ? 
                  <div className={`w-full font-bold text-gray-900 ${FONT_SIZES['xlarge']}`}>{data.companyName}</div> 
                : 
                  <div onClick={() => openTextInput('実習先', data.companyName, v => onUpdate('companyName', v))} className={`w-full font-bold text-gray-900 cursor-pointer hover:bg-gray-50/50 min-h-[1.5rem] ${FONT_SIZES['xlarge']}`}>
                    {data.companyName || <span className="text-gray-400 font-normal">クリックして入力</span>}
                  </div>
                }
              </div>
              <div className="w-full flex items-center border-b-[3px] border-gray-800 pb-1 relative group">
                <span className="font-bold text-gray-900 mr-2 whitespace-nowrap">実習日:</span>
                {isExporting ? 
                  <div className={`w-full font-bold text-gray-900 ${FONT_SIZES['xlarge']}`}>{formatPeriodDisplay(data.startDate, data.endDate, data.daysCount, data.period)}</div> 
                : 
                  <div onClick={openPeriodModal} className={`w-full font-bold text-gray-900 cursor-pointer hover:bg-gray-50/50 min-h-[1.5rem] ${FONT_SIZES['xlarge']}`}>
                    {formatPeriodDisplay(data.startDate, data.endDate, data.daysCount, data.period) || <span className="text-gray-400 font-normal">クリックして日付と日数を入力</span>}
                  </div>
                }
              </div>
            </div>

            <TargetField field="activities" num="①" title="実習中の活動" bgColor="bg-white" value={data.activities} onClick={() => openTextInput('実習中の活動', data.activities, v => onUpdate('activities', v), true)} isExporting={isExporting} fontSizeMode={getFontSize('activities')} onFontSizeChange={onFontSizeChange} heightClass="h-40 sm:h-48" />
            
            <div className="relative pt-4 w-full mt-4 sm:mt-6 group">
              {!isExporting && (
                <div className="absolute -top-1 right-2 z-20 opacity-40 hover:opacity-100 focus-within:opacity-100 transition-opacity">
                  <FontSizeToggle value={getFontSize('goal')} onChange={(v) => onFontSizeChange('goal', v)} />
                </div>
              )}
              <div className={`absolute top-0 left-4 sm:left-8 px-5 sm:px-8 bg-blue-200 border-[3px] border-gray-800 rounded-full ${isExporting ? 'pt-0 pb-2' : 'py-1'} z-10 font-bold text-gray-900 shadow-sm flex items-center justify-start text-lg sm:text-xl tracking-widest`}>
                ② 目標と評価
              </div>
              <div className={`border-[3px] border-gray-800 rounded-3xl p-4 sm:p-6 pt-10 sm:pt-12 bg-white shadow-sm relative z-0 flex flex-col gap-4 min-h-[10rem] h-auto`}>
                {(data.goals || []).map((goal, index) => {
                  const evalColor = getGoalEvaluationColor(goal.evaluation || 0);
                  return (
                  <div key={goal.id} className="flex flex-col sm:flex-row items-stretch border-b-2 border-dashed border-gray-300 pb-4 last:border-b-0 last:pb-0 relative group/goal">
                    {!isExporting && (data.goals || []).length > 1 && (
                        <button type="button" onClick={() => handleRemoveGoal(index)} className="absolute -top-2 -right-2 bg-white border-2 border-red-400 text-red-500 hover:bg-red-50 w-6 h-6 rounded-full flex items-center justify-center font-bold opacity-0 group-hover/goal:opacity-100 z-20 transition-opacity shadow-sm leading-none pb-0.5">&times;</button>
                    )}
                    <div className="flex-1 pr-0 sm:pr-4 border-r-0 sm:border-r-2 border-gray-300 mb-4 sm:mb-0 flex flex-col">
                      {isExporting ? (
                         <div className="flex-1 relative w-full h-full min-h-[4rem]">
                           <AutoFitText text={goal.text} maxSize={28} className="text-gray-800 font-medium" />
                         </div>
                      ) : (
                         <div
                           onClick={() => openTextInput('目標', goal.text, v => handleGoalTextChange(index, v), true)}
                           className={`w-full h-full min-h-[4rem] cursor-pointer hover:bg-gray-50/50 bg-transparent font-medium text-gray-800 whitespace-pre-wrap ${FONT_SIZES[getFontSize('goal')]}`}
                         >
                           {goal.text || <span className="text-gray-400">目標を入力...</span>}
                         </div>
                      )}
                    </div>
                    <div className="w-full sm:w-1/3 pl-0 sm:pl-4 flex flex-col justify-center items-center">
                       <div className={`text-6xl font-black ${evalColor.text} mb-2 h-14 flex items-center justify-center relative -left-6 ${isExporting ? '-translate-y-4' : ''}`}>
                         {getGoalEvaluationMark(goal.evaluation || 0)}
                       </div>
                       <div className="flex items-center w-full gap-2">
                         {!isExporting ? (
                           <input 
                             type="range" min="0" max="100" step="1" 
                             value={goal.evaluation || 0} 
                             onChange={(e) => handleGoalEvalChange(index, parseInt(e.target.value))} 
                             className="custom-slider flex-grow" 
                             style={{ background: `linear-gradient(to right, ${evalColor.bar} ${goal.evaluation || 0}%, #e2e8f0 ${goal.evaluation || 0}%)` }} 
                           />
                         ) : (
                           <div className="relative w-full h-3 rounded-full bg-slate-200" style={{ background: `linear-gradient(to right, ${evalColor.bar} ${goal.evaluation || 0}%, #e2e8f0 ${goal.evaluation || 0}%)` }}>
                             <div className={`absolute top-1/2 -mt-2.5 w-5 h-5 rounded-full ${evalColor.thumb} shadow-md border-2 border-white`} style={{ left: `calc(${goal.evaluation || 0}% - 10px)` }}></div>
                           </div>
                         )}
                         <span className={`font-bold ${evalColor.text} w-12 text-right shrink-0`}>{goal.evaluation || 0}%</span>
                       </div>
                    </div>
                  </div>
                  );
                })}
                {!isExporting && (
                  <button 
                    type="button" 
                    onClick={handleAddGoal} 
                    className="w-full py-2 bg-blue-50 hover:bg-blue-100 border-2 border-dashed border-blue-300 text-blue-500 rounded-xl font-bold flex items-center justify-center gap-1 transition-colors mt-2"
                  >
                    <span className="text-xl leading-none">＋</span> 目標を追加
                  </button>
                )}
              </div>
            </div>

            <TargetField field="comment" num="③" title="実習先の方から" bgColor="bg-yellow-300" value={data.comment} onClick={() => openTextInput('実習先の方から', data.comment, v => onUpdate('comment', v), true)} isExporting={isExporting} fontSizeMode={getFontSize('comment')} onFontSizeChange={onFontSizeChange} heightClass="h-32 sm:h-40" />
            <TargetField field="reflection" num="④" title="実習の振り返りと今後がんばりたいこと" bgColor="bg-orange-300" value={data.reflection} onClick={() => openTextInput('実習の振り返りと今後がんばりたいこと', data.reflection, v => onUpdate('reflection', v), true)} isExporting={isExporting} fontSizeMode={getFontSize('reflection')} onFontSizeChange={onFontSizeChange} heightClass="h-32 sm:h-48" />
          </div>
        </div>
      );
    };

    const DocsView = ({ data, isExporting, updateCurrentData, openTextInput, setDeleteTabModal, activeTab, formatDate }) => {
      return (
        <div className={`flex flex-col gap-6 relative bg-white rounded-xl shadow-inner p-4 sm:p-8 min-h-[80vh] font-pop`}>
          <div className="flex flex-col md:flex-row justify-between items-start sm:items-end border-b-[3px] border-gray-800 pb-3 mt-4 gap-4">
            <div className="flex items-center gap-2">
               {!isExporting && (
                 <div className="flex flex-col gap-1">
                   <div className="flex items-center justify-between">
                     <span className="text-xs font-bold text-gray-500">タブ名</span>
                     <button type="button" onClick={() => setDeleteTabModal({ isOpen: true, targetId: activeTab })} className="text-xs text-red-500 hover:text-red-700 hover:bg-red-50 px-1 py-0.5 rounded transition-colors flex items-center gap-0.5" title="このタブを削除">
                       <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>タブを削除
                     </button>
                   </div>
                   <div onClick={() => openTextInput('タブ名', data.tabLabel, v => updateCurrentData(prev => ({...prev, tabLabel: v})))} className="text-sm font-bold border-2 border-gray-300 rounded px-2 py-1 w-32 bg-gray-50 text-gray-700 cursor-pointer hover:bg-gray-100 min-h-[2rem] flex items-center">
                     {data.tabLabel}
                   </div>
                 </div>
               )}
               <h1 className="text-xl sm:text-2xl md:text-3xl font-black text-gray-900 tracking-wider ml-2">私の履歴書～{data.tabLabel}</h1>
            </div>
            <div className="flex flex-col items-end gap-2 ml-auto">
              {data.updatedAt && (
                <span className="text-xs sm:text-sm font-bold text-gray-500 shrink-0">
                  最終更新: {formatDate(data.updatedAt)}
                </span>
              )}
              {!isExporting && (
                <button type="button" onClick={() => updateCurrentData(prev => ({...prev, records: [...(prev.records || []), { id: Date.now(), date: '', title: '', description: '' }]}))} className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-md active:scale-95 transition-transform">記録を追加</button>
              )}
            </div>
          </div>
          <div className="flex flex-col gap-4 mt-4">
            {(data.records || []).map((rec, index) => (
              <div key={rec.id} className="relative bg-gray-50 border-2 border-gray-200 rounded-xl p-4 flex flex-col sm:flex-row gap-4 group">
                {!isExporting && <button type="button" onClick={() => updateCurrentData(prev => ({...prev, records: prev.records.filter(r => r.id !== rec.id)}))} className="absolute -top-3 -right-3 bg-white border-2 border-red-400 text-red-500 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center font-bold opacity-0 group-hover:opacity-100 z-20 transition-opacity shadow-sm">&times;</button>}
                
                <div className="flex flex-col sm:w-1/4 gap-2">
                  <span className="text-xs font-bold text-gray-500">受賞日時・年月</span>
                  {isExporting ? (
                    <div className="font-bold text-gray-800 text-lg border-b-2 border-gray-300 pb-1">{rec.date}</div>
                  ) : (
                    <div onClick={() => openTextInput('受賞日時・年月', rec.date, v => { updateCurrentData(prev => { const newRecs = [...prev.records]; newRecs[index].date = v; return { ...prev, records: newRecs }; }); })} className="p-2 border border-gray-300 rounded font-bold text-gray-700 bg-white cursor-pointer hover:bg-gray-50 min-h-[2.5rem]">
                      {rec.date || <span className="text-gray-400 font-normal">例：2024年10月</span>}
                    </div>
                  )}
                </div>

                <div className="flex flex-col sm:w-3/4 gap-2">
                  <span className="text-xs font-bold text-gray-500">受賞名・記録</span>
                  {isExporting ? (
                    <div className="font-bold text-gray-900 text-xl border-b-2 border-gray-300 pb-1">{rec.title}</div>
                  ) : (
                    <div onClick={() => openTextInput('受賞名・記録', rec.title, v => { updateCurrentData(prev => { const newRecs = [...prev.records]; newRecs[index].title = v; return { ...prev, records: newRecs }; }); })} className="p-2 border border-gray-300 rounded font-bold text-gray-900 bg-white text-lg cursor-pointer hover:bg-gray-50 min-h-[3rem]">
                      {rec.title || <span className="text-gray-400 font-normal">例：〇〇大会 優勝</span>}
                    </div>
                  )}
                  
                  <span className="text-xs font-bold text-gray-500 mt-2">詳細・メモ</span>
                  {isExporting ? (
                    <div className="font-medium text-gray-700 whitespace-pre-wrap">{rec.description}</div>
                  ) : (
                    <div onClick={() => openTextInput('詳細・メモ', rec.description, v => { updateCurrentData(prev => { const newRecs = [...prev.records]; newRecs[index].description = v; return { ...prev, records: newRecs }; }); }, true)} className="p-2 border border-gray-300 rounded font-medium text-gray-700 bg-white h-24 overflow-y-auto cursor-pointer hover:bg-gray-50 whitespace-pre-wrap">
                      {rec.description || <span className="text-gray-400 font-normal">がんばったことや感想など...</span>}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {(data.records || []).length === 0 && (
              <div className="h-48 border-4 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center text-gray-400">
                <span className="font-bold text-xl">記録を追加してください</span>
              </div>
            )}
          </div>
        </div>
      );
    };

    const SkillsView = ({ allData, isExporting, formatDate, getAbilityStyle, onUpdate, openTextInput, getFontSize, onFontSizeChange, handleCopySkillsAdvicePrompt }) => {
      const data = allData.skills || {};
      const abilitiesByGrade = { 1: [], 2: [], 3: [] };
      const seenAbilityNames = new Set();

      [1, 2, 3].forEach(grade => {
        const grid = allData[`high${grade}`]?.abilitiesGrid?.slice(0, 16) || [];
        grid.forEach(a => {
          if (a && a.name && !seenAbilityNames.has(a.name)) {
            seenAbilityNames.add(a.name);
            abilitiesByGrade[grade].push(a);
          }
        });
      });

      const totalAbilitiesCount = seenAbilityNames.size;

      const allAbilities = [];
      [1, 2, 3].forEach(grade => {
        abilitiesByGrade[grade].forEach(a => {
          allAbilities.push({ ...a, grade });
        });
      });

      const abilitySlots = Array(25).fill(null);
      if (allAbilities.length > 25) {
        for (let i = 0; i < 24; i++) {
          abilitySlots[i] = allAbilities[i];
        }
        abilitySlots[24] = { isOverflow: true, name: `他${allAbilities.length - 24}個`, type: 'overflow' };
      } else {
        allAbilities.forEach((a, i) => {
          abilitySlots[i] = a;
        });
      }

      const statsByGrade = { 1: [], 2: [], 3: [] };

      [1, 2, 3].forEach(grade => {
        const gradeData = allData[`high${grade}`];
        if (gradeData && gradeData.basicStats) {
          gradeData.basicStats.forEach(stat => {
            if (stat.name && stat.name.trim() !== '') {
              const firstRecord = stat.records?.find(r => r.value > 0);
              const lastRecord = stat.records?.slice().reverse().find(r => r.value > 0);
              statsByGrade[grade].push({
                name: stat.name,
                icon: stat.name.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)\s*/u)?.[0] || '',
                text: stat.name.replace(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)\s*/u, ''),
                firstValue: firstRecord ? firstRecord.value : '-',
                lastValue: lastRecord ? lastRecord.value : '-'
              });
            }
          });
        }
        while (statsByGrade[grade].length < 3) {
          statsByGrade[grade].push(null);
        }
      });

      const getMiniAbilityStyle = (type) => {
        switch (type) {
          case 'rainbow': return `bg-gradient-to-r from-pink-400 via-yellow-400 to-cyan-400 border-white text-gray-900`;
          case 'gold': return `bg-gradient-to-b from-yellow-200 to-yellow-400 border-yellow-500 text-gray-900`;
          case 'red': case 'red_f': case 'red_d': return `bg-pink-100 border-pink-400 text-gray-900`;
          case 'green': case 'green_f': return `bg-emerald-100 border-emerald-400 text-gray-900`;
          case 'blue': case 'blue_b': case 'blue_d': return `bg-cyan-100 border-cyan-400 text-gray-900`;
          case 'overflow': return `bg-gray-100 border-gray-400 text-gray-700`;
          default: return `bg-white border-gray-300 text-gray-900`;
        }
      };

      return (
        <div className={`flex flex-col ${isExporting ? 'gap-4' : 'gap-4 sm:gap-6'} relative bg-white rounded-xl shadow-inner p-4 sm:p-8 font-pop min-h-[80vh]`}>
          <div className={`flex flex-col md:flex-row justify-between items-start sm:items-end border-b-[3px] border-gray-800 ${isExporting ? 'pb-2 mt-0' : 'pb-3 mt-4'} gap-4`}>
            <h1 className="text-xl sm:text-2xl md:text-3xl font-black text-purple-800 tracking-widest whitespace-nowrap">私の履歴書～{data.tabLabel || '成長タイムライン'}</h1>
            {data.updatedAt && (
              <span className="text-xs sm:text-sm font-bold text-gray-500 shrink-0 ml-auto">
                最終更新: {formatDate(data.updatedAt)}
              </span>
            )}
          </div>

          <div className={`bg-purple-50/60 rounded-xl ${isExporting ? 'p-3' : 'p-4 sm:p-6'} border-[3px] border-purple-200 shadow-sm mt-2`}>
            <h2 className="text-xl sm:text-2xl font-bold text-purple-900 mb-3 flex items-center gap-2 flex-wrap">
              <span className="text-2xl sm:text-3xl">🌟</span>
              獲得した「好きなこと・得意なこと・自慢したいこと」
              <span className="ml-auto text-2xl sm:text-3xl font-black text-purple-600">{totalAbilitiesCount}個</span>
            </h2>
            <div className="grid grid-cols-5 grid-rows-5 gap-2 sm:gap-3">
              {abilitySlots.map((a, i) => (
                <div key={i} className={`relative flex items-center justify-center ${isExporting ? 'h-20' : 'h-20 sm:h-24'}`}>
                  {a ? (
                    <div className={`w-full h-full relative p-1 pt-4 rounded-lg border-2 flex flex-col items-center justify-center shadow-sm ${isExporting ? '' : 'overflow-hidden'} ${getMiniAbilityStyle(a.type)}`}>
                       {!a.isOverflow && <span className={`absolute top-0 left-0 text-[10px] sm:text-xs font-black bg-purple-600 text-white px-1.5 py-0.5 rounded-br-lg shadow-sm z-10 leading-none ${isExporting ? '-translate-y-2' : ''}`}>高{a.grade}</span>}
                       <span className={`w-full text-center font-bold text-lg sm:text-xl leading-snug break-words px-1 pb-1 ${a.isOverflow ? '-mt-3 text-gray-600' : ''}`}>{a.name}</span>
                    </div>
                  ) : (
                    <div className="w-full h-full border-2 border-dashed border-purple-200 rounded-lg bg-white/40 flex items-center justify-center text-purple-200 text-lg font-light"></div>
                  )}
                </div>
              ))}
            </div>
          </div>

          <div className={`bg-blue-50/60 rounded-xl ${isExporting ? 'p-4' : 'p-4 sm:p-6'} border-[3px] border-blue-200 shadow-sm mt-2`}>
            <h2 className="text-xl sm:text-2xl font-bold text-blue-900 mb-4 flex items-center gap-2">
              <span className="text-2xl sm:text-3xl">📈</span>
              能力値の3年間の変化
            </h2>
            
            <div className={`flex flex-col ${isExporting ? 'gap-2' : 'gap-4'}`}>
              {[1, 2, 3].map(grade => (
                <div key={grade} className={`flex flex-col sm:flex-row gap-2 sm:gap-3 border-b-2 border-blue-100 ${isExporting ? 'pb-2' : 'pb-4'} last:border-0 last:pb-0`}>
                  <div className="w-full sm:w-24 shrink-0 font-black text-blue-700 bg-blue-200 rounded-lg flex items-center justify-center py-1.5 h-fit shadow-sm">高{grade}</div>
                  <div className="flex-grow grid grid-cols-3 gap-2">
                    {statsByGrade[grade].map((stat, i) => (
                      <div key={i} className={`bg-white p-1.5 sm:p-2 rounded-xl shadow-sm border-2 ${stat ? 'border-blue-200' : 'border-dashed border-blue-200 bg-white/50'} flex flex-col items-center justify-center gap-1.5 ${isExporting ? 'h-28' : 'h-32 sm:h-36'}`}>
                        {stat ? (
                          <div className={`w-full flex flex-col items-center gap-2 ${isExporting ? '-translate-y-1' : ''}`}>
                            <div className={`font-black text-gray-800 truncate w-full text-center bg-blue-50 rounded-md py-1.5 px-1 ${isExporting ? 'text-lg' : 'text-lg sm:text-xl'}`}>{stat.icon} {stat.text}</div>
                            <div className="font-black text-blue-600 flex items-baseline justify-center">
                              <span className={isExporting ? 'text-4xl leading-none' : 'text-4xl sm:text-5xl leading-none'}>{stat.firstValue}</span>
                              <span className={`text-gray-400 mx-1 sm:mx-2 ${isExporting ? 'text-xl' : 'text-xl sm:text-2xl'}`}>→</span>
                              <span className={isExporting ? 'text-4xl leading-none' : 'text-4xl sm:text-5xl leading-none'}>{stat.lastValue}</span>
                            </div>
                          </div>
                        ) : (
                          <div className="w-full h-full flex items-center justify-center"></div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <TargetField 
            field="aiAdvice" num="💡" title="夢の実現に向けてのアドバイス" 
            bgColor="bg-yellow-200" 
            value={data.aiAdvice} 
            onClick={() => openTextInput('夢の実現に向けてのアドバイス', data.aiAdvice, v => onUpdate('aiAdvice', v), true)} 
            isExporting={isExporting} 
            fontSizeMode={getFontSize('aiAdvice')} 
            onFontSizeChange={onFontSizeChange}
            heightClass={isExporting ? "h-48" : "h-48 sm:h-56"}
            actionButton={
              <AiActionPanel
                onGenerate={handleCopySkillsAdvicePrompt}
                buttonText="AI先生に聞いてみよう"
                bgColorClass="bg-yellow-100"
                hoverColorClass="hover:bg-yellow-200"
                textColorClass="text-yellow-800"
                borderColorClass="border-yellow-300"
              />
            }
          />
        </div>
      );
    };
